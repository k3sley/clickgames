<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Clicker Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #001f3f, #0074D9, #001f3f);
  animation: water 10s linear infinite;
  z-index: -1;
}

@keyframes water {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

/* TOPO */
#top {
  text-align: center;
  padding: 10px;
  background: rgba(0,0,0,0.5);
}

/* MENU */
#menu {
  display: flex;
  justify-content: center;
  padding: 10px;
}

.menuBtn {
  margin: 0 10px;
  padding: 10px 20px;
  background: #333;
  border-radius: 6px;
  cursor: pointer;
}

/* TELAS */
.screen {
  display: none;
  text-align: center;
  padding: 20px;
}

.active {
  display: block;
}

/* BOTAO */
#clickBtn {
  background: #00ff99;
  padding: 25px;
  font-size: 20px;
  border-radius: 10px;
  position: relative;
}

/* LOJA */
.upgrade {
  display: block;
  margin: 10px auto;
  padding: 12px;
  background: #444;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* CURSORES */
.cursor {
  position: absolute;
  font-size: 20px;
  animation: clickAnim 0.5s infinite alternate;
}

@keyframes clickAnim {
  from { transform: translateY(0); }
  to { transform: translateY(5px); }
}
</style>
</head>

<body>

<div id="top">
  💰 Pontos: <span id="points">0</span>
</div>

<div id="menu">
  <div class="menuBtn" onclick="showScreen('game')">🎮</div>
  <div class="menuBtn" onclick="showScreen('shop')">🛒</div>
</div>

<div id="game" class="screen active">
  <button id="clickBtn">CLICAR</button>
  <h3>Por clique: <span id="perClick">1</span></h3>
  <h3>Auto click: <span id="auto">0</span></h3>
</div>

<div id="shop" class="screen">
  <h2>Loja</h2>

  <button class="upgrade" onclick="buyUpgrade(1)">
    +1 clique (100)
  </button>

  <button class="upgrade" onclick="buyUpgrade(2)">
    +5 clique (500)
  </button>

  <button class="upgrade" onclick="buyAuto()">
    Auto click (1000)
  </button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let points = 0;
let perClick = 1;
let autoLevel = 0;

let upgrades = {
  1: { cost: 100, increase: 1 },
  2: { cost: 500, increase: 5 }
};

const clickBtn = document.getElementById("clickBtn");

// telas
window.showScreen = (name)=>{
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(name).classList.add("active");
};

// UI
function updateUI(){
  document.getElementById("points").innerText = Math.floor(points);
  document.getElementById("perClick").innerText = perClick;
  document.getElementById("auto").innerText = autoLevel;
}

// SAVE
setInterval(()=>{
  localStorage.setItem("points", points);
  localStorage.setItem("perClick", perClick);
  localStorage.setItem("autoLevel", autoLevel);
},1000);

// LOAD
points = parseInt(localStorage.getItem("points"))||0;
perClick = parseInt(localStorage.getItem("perClick"))||1;
autoLevel = parseInt(localStorage.getItem("autoLevel"))||0;

// CLICK
clickBtn.onclick = ()=>{
  points += perClick;
  updateUI();
};

// AUTO (agora é multiplicador visual)
setInterval(()=>{
  if(autoLevel > 0){
    points += perClick * autoLevel * 0.3;
    updateUI();
  }
},1000);

// UPGRADE
window.buyUpgrade = (id)=>{
  let u = upgrades[id];
  if(points >= u.cost){
    points -= u.cost;
    perClick += u.increase;
    updateUI();
  }
};

// AUTO
window.buyAuto = ()=>{
  if(points >= 1000){
    points -= 1000;
    autoLevel++;

    // cria cursor visual
    let c = document.createElement("div");
    c.className = "cursor";
    c.innerText = "🖱️";

    c.style.left = Math.random()*200 + "px";
    c.style.top = Math.random()*100 + "px";

    clickBtn.appendChild(c);

    updateUI();
  }
};

updateUI();

});
</script>

</body>
</html>
