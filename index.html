<script>
let points = 0;
let perClick = 1;
let autoClick = 0;
let autoCost = 100;
let currentSkin = "";

let rebirths = 0;
let multiplier = 1;
let rebirthCost = 10000;

let upgrades = {
  1: { cost: 10, increase: 1 },
  2: { cost: 50, increase: 5 }
};

const pointsText = document.getElementById("points");
const perClickText = document.getElementById("perClick");
const autoText = document.getElementById("auto");
const rebirthText = document.getElementById("rebirths");
const multText = document.getElementById("mult");

// FORMATAR
function formatNumber(num) {
  if (num >= 1000000) return (num/1000000).toFixed(1) + "M";
  if (num >= 1000) return (num/1000).toFixed(1) + "K";
  return num;
}

// LOAD
window.onload = () => {
  points = parseInt(localStorage.getItem("points")) || 0;
  perClick = parseInt(localStorage.getItem("perClick")) || 1;
  autoClick = parseInt(localStorage.getItem("autoClick")) || 0;
  autoCost = parseInt(localStorage.getItem("autoCost")) || 100;
  currentSkin = localStorage.getItem("skin") || "";

  rebirths = parseInt(localStorage.getItem("rebirths")) || 0;
  multiplier = parseFloat(localStorage.getItem("multiplier")) || 1;
  rebirthCost = parseInt(localStorage.getItem("rebirthCost")) || 10000;

  // 🔥 NOVO: carregar custos upgrades
  upgrades[1].cost = parseInt(localStorage.getItem("cost1")) || 10;
  upgrades[2].cost = parseInt(localStorage.getItem("cost2")) || 50;

  // atualizar na tela
  document.getElementById("cost1").innerText = upgrades[1].cost;
  document.getElementById("cost2").innerText = upgrades[2].cost;
  document.getElementById("autoCost").innerText = autoCost;

  applySkin();
  updateUI();
};

// SAVE
setInterval(() => {
  localStorage.setItem("points", points);
  localStorage.setItem("perClick", perClick);
  localStorage.setItem("autoClick", autoClick);
  localStorage.setItem("autoCost", autoCost);
  localStorage.setItem("skin", currentSkin);

  localStorage.setItem("rebirths", rebirths);
  localStorage.setItem("multiplier", multiplier);
  localStorage.setItem("rebirthCost", rebirthCost);

  // 🔥 NOVO: salvar custos upgrades
  localStorage.setItem("cost1", upgrades[1].cost);
  localStorage.setItem("cost2", upgrades[2].cost);

}, 1000);

// CLICK
document.getElementById("clickBtn").onclick = () => {
  points += perClick * multiplier;

  let btn = document.getElementById("clickBtn");
  btn.style.transform = "scale(0.9)";
  setTimeout(() => btn.style.transform = "scale(1)", 100);

  let rect = btn.getBoundingClientRect();
  createParticle(rect.left + rect.width/2, rect.top);

  updateUI();
};

// AUTO
setInterval(() => {
  points += autoClick * multiplier;
  updateUI();
}, 100);

// UPGRADE
function buyUpgrade(id) {
  let u = upgrades[id];
  if (points >= u.cost) {
    points -= u.cost;
    perClick += u.increase;
    u.cost = Math.floor(u.cost * 1.5);
    document.getElementById("cost"+id).innerText = u.cost;
    updateUI();
  }
}

// AUTO BUY
function buyAuto() {
  if (points >= autoCost) {
    points -= autoCost;
    autoClick++;
    autoCost = Math.floor(autoCost * 1.6);
    document.getElementById("autoCost").innerText = autoCost;
    updateUI();
  }
}

// SKIN
function buySkin(skin) {
  let cost = (skin === "gold") ? 500 : 200;
  if (points >= cost) {
    points -= cost;
    currentSkin = skin;
    applySkin();
  }
}

function applySkin() {
  let btn = document.getElementById("clickBtn");
  btn.classList.remove("red","blue","gold");
  if (currentSkin) btn.classList.add(currentSkin);
}

// REBIRTH
function rebirth() {
  if (points >= rebirthCost) {
    rebirths++;
    multiplier += 0.5;

    points = 0;
    perClick = 1;
    autoClick = 0;
    autoCost = 100;

    // 🔥 reset upgrades corretamente
    upgrades[1].cost = 10;
    upgrades[2].cost = 50;

    rebirthCost = Math.floor(rebirthCost * 2);

    updateUI();
  } else {
    alert("Pontos insuficientes para rebirth!");
  }
}

// PARTICULAS
function createParticle(x,y){
  let p = document.createElement("div");
  p.className="particle";
  p.innerText="+"+perClick;

  p.style.left=x+"px";
  p.style.top=y+"px";

  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
}

// UPDATE
function updateUI(){
  pointsText.innerText = formatNumber(points);
  perClickText.innerText = perClick;
  autoText.innerText = autoClick;
  rebirthText.innerText = rebirths;
  multText.innerText = multiplier.toFixed(1);
  document.getElementById("rebirthCost").innerText = formatNumber(rebirthCost);
}
</script>
