<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Clicker Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

/* 🌊 FUNDO ANIMADO */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #001f3f, #0074D9, #001f3f);
  animation: water 10s linear infinite;
  z-index: -1;
}

@keyframes water {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

/* MENU */
#menu {
  display: flex;
  justify-content: center;
  background: rgba(0,0,0,0.5);
  padding: 10px;
}

.menuBtn {
  margin: 0 10px;
  padding: 10px 20px;
  background: #333;
  border-radius: 6px;
  cursor: pointer;
}

/* TELAS */
.screen {
  display: none;
  text-align: center;
  padding: 20px;
}

.active {
  display: block;
}

/* BOTAO */
#clickBtn {
  background: #00ff99;
  padding: 25px;
  font-size: 20px;
  border-radius: 10px; /* quadrado */
}

/* LOJA */
.upgrade {
  display: block;
  margin: 10px auto;
  padding: 10px;
  background: #333;
  border-radius: 6px;
  cursor: pointer;
}

/* REBIRTH */
.rebirthBtn {
  background: #2196f3;
}
</style>
</head>

<body>

<div id="menu">
  <div class="menuBtn" onclick="showScreen('game')">🎮 Jogo</div>
  <div class="menuBtn" onclick="showScreen('shop')">🛒 Loja</div>
  <div class="menuBtn" onclick="showScreen('rebirth')">🔁 Rebirth</div>
</div>

<div id="game" class="screen active">
  <h1>Pontos: <span id="points">0</span></h1>
  <button id="clickBtn">CLICAR</button>
  <h3>Por clique: <span id="perClick">1</span></h3>
  <h3>Auto: <span id="auto">0</span>/s</h3>
</div>

<div id="shop" class="screen">
  <h2>Loja</h2>

  <button class="upgrade" onclick="buyUpgrade(1)">
    +1 clique (Custo: <span id="cost1">10</span>)
  </button>

  <button class="upgrade" onclick="buyUpgrade(2)">
    +5 clique (Custo: <span id="cost2">50</span>)
  </button>

  <button class="upgrade" onclick="buyAuto()">
    Auto (+1/s) (Custo: <span id="autoCost">75</span>)
  </button>
</div>

<div id="rebirth" class="screen">
  <h2>Rebirth</h2>
  <p>Rebirths: <span id="rebirths">0</span></p>
  <p>Multiplicador: x<span id="mult">1</span></p>

  <button class="upgrade rebirthBtn" onclick="rebirth()">
    Rebirth (Custo: <span id="rebirthCost">10000</span>)
  </button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let points = 0;
let perClick = 1;
let autoClick = 0;
let autoCost = 75;

let rebirths = 0;
let multiplier = 1;
let rebirthCost = 10000;

let upgrades = {
  1: { cost: 10, increase: 1 },
  2: { cost: 50, increase: 5 }
};

window.showScreen = (name)=>{
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(name).classList.add("active");
};

function updateUI(){
  document.getElementById("points").innerText = Math.floor(points);
  document.getElementById("perClick").innerText = perClick;
  document.getElementById("auto").innerText = autoClick;
  document.getElementById("rebirths").innerText = rebirths;
  document.getElementById("mult").innerText = multiplier.toFixed(1);

  document.getElementById("cost1").innerText = upgrades[1].cost;
  document.getElementById("cost2").innerText = upgrades[2].cost;
  document.getElementById("autoCost").innerText = autoCost;
  document.getElementById("rebirthCost").innerText = rebirthCost;
}

// LOAD
points = parseInt(localStorage.getItem("points"))||0;
perClick = parseInt(localStorage.getItem("perClick"))||1;
autoClick = parseInt(localStorage.getItem("autoClick"))||0;
autoCost = parseInt(localStorage.getItem("autoCost"))||75;

rebirths = parseInt(localStorage.getItem("rebirths"))||0;
multiplier = parseFloat(localStorage.getItem("multiplier"))||1;
rebirthCost = parseInt(localStorage.getItem("rebirthCost"))||10000;

upgrades[1].cost = parseInt(localStorage.getItem("cost1"))||10;
upgrades[2].cost = parseInt(localStorage.getItem("cost2"))||50;

// SAVE
setInterval(()=>{
  localStorage.setItem("points", points);
  localStorage.setItem("perClick", perClick);
  localStorage.setItem("autoClick", autoClick);
  localStorage.setItem("autoCost", autoCost);
  localStorage.setItem("rebirths", rebirths);
  localStorage.setItem("multiplier", multiplier);
  localStorage.setItem("rebirthCost", rebirthCost);
  localStorage.setItem("cost1", upgrades[1].cost);
  localStorage.setItem("cost2", upgrades[2].cost);
},1000);

// CLICK
document.getElementById("clickBtn").onclick = ()=>{
  points += perClick * multiplier;
  updateUI();
};

// AUTO
setInterval(()=>{
  points += autoClick * (multiplier * 0.2);
  updateUI();
},1000);

// FUNÇÕES
window.buyUpgrade = (id)=>{
  let u = upgrades[id];
  if(points >= u.cost){
    points -= u.cost;
    perClick += u.increase;
    u.cost = Math.floor(u.cost * 1.5);
    updateUI();
  }
};

window.buyAuto = ()=>{
  if(points >= autoCost){
    points -= autoCost;
    autoClick++;
    autoCost = Math.floor(autoCost * 1.2);
    updateUI();
  }
};

window.rebirth = ()=>{
  if(points >= rebirthCost){
    rebirths++;
    multiplier += 0.3;

    points = 0;
    perClick = 1;
    autoClick = 0;
    autoCost = 75;

    upgrades[1].cost = 10;
    upgrades[2].cost = 50;

    rebirthCost *= 2;
    updateUI();
  }
};

updateUI();

});
</script>

</body>
</html>
