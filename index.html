<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Clicker Game</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0d0d0d;
  color: white;
}

/* MENU */
#menu {
  display: flex;
  justify-content: center;
  background: #1a1a1a;
  padding: 10px;
}

.menuBtn {
  margin: 0 10px;
  padding: 10px 20px;
  background: #333;
  border-radius: 8px;
  cursor: pointer;
}

/* TELAS */
.screen {
  display: none;
  text-align: center;
  padding: 20px;
}

.active {
  display: block;
}

/* BOTAO CENTRAL */
#clickBtn {
  background: #00ff99;
  font-size: 24px;
  padding: 30px;
  border-radius: 50%;
  margin-top: 20px;
}

/* LOJA */
.upgrade {
  display: block;
  margin: 10px auto;
  padding: 10px;
  background: #333;
  border-radius: 8px;
  cursor: pointer;
}

/* REBIRTH */
.rebirthBtn {
  background: #2196f3;
}

/* PARTICULAS */
.particle {
  position: absolute;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  0% {opacity:1; transform:translateY(0);}
  100% {opacity:0; transform:translateY(-50px);}
}
</style>
</head>

<body>

<div id="menu">
  <div class="menuBtn" onclick="showScreen('game')">🎮 Jogo</div>
  <div class="menuBtn" onclick="showScreen('shop')">🛒 Loja</div>
  <div class="menuBtn" onclick="showScreen('rebirth')">🔁 Rebirth</div>
</div>

<!-- TELA JOGO -->
<div id="game" class="screen active">
  <h1>Pontos: <span id="points">0</span></h1>
  <button id="clickBtn">CLIQUE</button>
  <h3>Por clique: <span id="perClick">1</span></h3>
  <h3>Auto: <span id="auto">0</span>/s</h3>
</div>

<!-- LOJA -->
<div id="shop" class="screen">
  <h2>Upgrades</h2>

  <button class="upgrade" onclick="buyUpgrade(1)">
    +1 por clique (Custo: <span id="cost1">10</span>)
  </button>

  <button class="upgrade" onclick="buyUpgrade(2)">
    +5 por clique (Custo: <span id="cost2">50</span>)
  </button>

  <button class="upgrade" onclick="buyAuto()">
    Auto click (+1/s) (Custo: <span id="autoCost">75</span>)
  </button>
</div>

<!-- REBIRTH -->
<div id="rebirth" class="screen">
  <h2>Rebirth</h2>
  <p>Rebirths: <span id="rebirths">0</span></p>
  <p>Multiplicador: x<span id="mult">1</span></p>

  <button class="upgrade rebirthBtn" onclick="rebirth()">
    Rebirth (Custo: <span id="rebirthCost">10000</span>)
  </button>
</div>

<script>
let points = 0;
let perClick = 1;
let autoClick = 0;
let autoCost = 75;

let rebirths = 0;
let multiplier = 1;
let rebirthCost = 10000;

let upgrades = {
  1: { cost: 10, increase: 1 },
  2: { cost: 50, increase: 5 }
};

// trocar telas
function showScreen(name){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(name).classList.add("active");
}

// salvar
setInterval(()=>{
  localStorage.setItem("points", points);
  localStorage.setItem("perClick", perClick);
  localStorage.setItem("autoClick", autoClick);
  localStorage.setItem("autoCost", autoCost);
  localStorage.setItem("rebirths", rebirths);
  localStorage.setItem("multiplier", multiplier);
  localStorage.setItem("rebirthCost", rebirthCost);

  localStorage.setItem("cost1", upgrades[1].cost);
  localStorage.setItem("cost2", upgrades[2].cost);
},1000);

// carregar
window.onload = ()=>{
  points = parseInt(localStorage.getItem("points"))||0;
  perClick = parseInt(localStorage.getItem("perClick"))||1;
  autoClick = parseInt(localStorage.getItem("autoClick"))||0;
  autoCost = parseInt(localStorage.getItem("autoCost"))||75;

  rebirths = parseInt(localStorage.getItem("rebirths"))||0;
  multiplier = parseFloat(localStorage.getItem("multiplier"))||1;
  rebirthCost = parseInt(localStorage.getItem("rebirthCost"))||10000;

  upgrades[1].cost = parseInt(localStorage.getItem("cost1"))||10;
  upgrades[2].cost = parseInt(localStorage.getItem("cost2"))||50;

  updateUI();
};

// clique
document.getElementById("clickBtn").onclick = (e)=>{
  points += perClick * multiplier;

  let rect = e.target.getBoundingClientRect();
  createParticle(rect.left+50, rect.top);

  updateUI();
};

// auto (nerfado)
setInterval(()=>{
  points += autoClick * (multiplier * 0.2);
  updateUI();
},1000);

// atualizações
função comprarAtualizar(id){
  dêixar u = atualizações[id];
  se(pontos >= u.custo){
    pontos -= u.custo;
    por camarilha += u.aumentar;
    u.custo = Matemática.chão(u.custo * 1,5);
  }
}

// automático
diversidade comprarAuto(){
  se(pontos >= custo automático){
    pontos -= custo automático;
    camarilha automático++;
    custo automático = Matemática.chão(custo automático * 1.2);
  }
}

// renascimento
diversidade renascimento(){
  se(pontos >= custo de renascimento){
    renascimentos++;
    multiplicador += 0,3;

    pontos = 0;
    por camarilha = 1;
    camarilha automático = 0;
    custo automático = 75;

    atualizações[1].custo = 10;
    atualizações[2].custo = 50;

    custo de renascimento *= 2;
  }
}

// particípios
diversidade criarPartícula(x,y){
  dêixar p = documento.criarElemento("div");
  p.nome sim classe="partícula";
  p.texto interno="+";

  p.estilo.escarada=x+"px";
  p.estilo.topo=y+"px";

  documento.corpo.anexarCriança(p);
  definirTempo limite(()=>p.removedor(),1000);
}

// Interface do usuário
diversidade atualizaçãoUI(){
  documento.obterElementoPorId("pontos").texto interno = Matemática.chão(pontos);
  documento.obterElementoPorId("perClick").texto interno = por camarilha;
  documento.obterElementoPorId("automático").texto interno = camarilha automático;
  documento.obterElementoPorId("renascimentos").texto interno = renascimentos;
  documento.obterElementoPorId("múltiplo").texto interno = multiplicador.paraFixo(1);

  documento.obterElementoPorId("custo1").texto interno = atualizações[1].custo;
  documento.obterElementoPorId("custo2").texto interno = atualizações[2].custo;
  documento.obterElementoPorId("custo automático").texto interno = custo automático;
  documento.obterElementoPorId("custo de renascimento").texto interno = custo de renascimento;
}
</roteiro>

</corpo>
  </HTML>
